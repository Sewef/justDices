<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>quickdice Popover</title>
    <style>
        :root {
            /* Light mode (default) */
            --text-color: rgba(0, 0, 0, 0.87);
            --panel-bg: rgba(245, 240, 255, 0.92);
            --panel-text: #1e1b4b;
            --panel-border: #8b5cf6;
            --border-color: #c4b5fd;
            --panel-button-bg: #e0d9ff;
            --panel-button-hover: #d1c4fb;
            --accent-primary: #6d28d9;
            --accent-glow: rgba(109, 40, 217, 0.22);
        }

        /* Dark mode */
        [data-theme="dark"] {
            --text-color: rgba(255, 255, 255, 0.87);
            --panel-bg: rgba(14, 16, 32, 0.92);
            --panel-text: rgba(255, 255, 255, 0.9);
            --panel-border: #5b21b6;
            --border-color: #3d2b6e;
            --panel-button-bg: #1e1b40;
            --panel-button-hover: #2d2a5e;
            --accent-primary: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.3);
        }

        /* Light mode */
        [data-theme="light"] {
            --text-color: rgba(0, 0, 0, 0.87);
            --panel-bg: rgba(245, 240, 255, 0.95);
            --panel-text: #1e1b4b;
            --panel-border: #8b5cf6;
            --border-color: #c4b5fd;
            --panel-button-bg: #e0d9ff;
            --panel-button-hover: #d1c4fb;
            --accent-primary: #6d28d9;
            --accent-glow: rgba(109, 40, 217, 0.22);
        }

        body {
            font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
            background-color: var(--panel-bg);
            color: var(--panel-text);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #dicePanel {
            position: fixed;
            width: auto;
            max-width: 90vw;
            /* Limite la largeur à 90% de la fenêtre */
            overflow-y: auto;
            overflow-x: hidden;

            color: var(--panel-text);
            /* border: 2px solid var(--panel-border); */
            /* border-radius: 10px; */
            /* z-index: 9999; */
            display: grid;
            /* gap: 0.25em; */
            font-size: 0.85em;
            transition: color 0.3s ease, border-color 0.3s ease;
            top: 0;
        }

        /* Ligne d'entête */
        .dice-row {
            grid-column: 1 / -1;
            font-weight: 600;
            font-size: 0.82em;
            letter-spacing: 0.08em;
            color: var(--accent-primary);
            padding-bottom: 0.2em;
            border-bottom: 1px solid var(--accent-primary);
            opacity: 0.9;
        }

        /* Boutons de dés */
        .dice-table button {
            background: var(--panel-button-bg);
            color: var(--panel-text);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            padding: 0.3em 0.4em;
            font-size: 0.9em;
            transition: border-color 0.2s ease;
        }

        .dice-table button:hover {
            border-color: var(--accent-primary);
        }

        .dice-table th {
            text-align: right;
        }


        #toggleHiddenRolls {
            font-size: 1.4em;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--panel-text);
            margin-left: auto;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.25em;
        }

        .panel-header h3 {
            font-family: var(--font-display);
            font-size: 0.8em;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent-primary);
            margin: 0.3em 0;
            opacity: 0.85;
        }

        .panel-controls {
            display: flex;
            gap: 0.3em;
        }

        .panel-controls button {
            font-size: 1.2em;
            padding: 0.2em 0.4em;
            border: none;
            background: none;
            cursor: pointer;
            color: inherit;
        }
    </style>
</head>

<body>
    <div id="dicePanel" class="dice-panel">
        <div class="panel-header">
            <h3>Quick Rolls</h3>
            <div class="panel-controls">
                <button id="toggleHiddenRolls" title="Toggle hide rolls" aria-label="Toggle hide rolls">🐵</button>
                <button id="closeDicePanel" aria-label="Close panel">✖</button>
            </div>
        </div>
        <table id="dice-table" class="dice-table"></table>
        <script type="module" src="/src/quickdice.js"></script>

    </div>
</body>

</html>
